<!DOCTYPE html>
<html>
<head>
  <title>Mustang Idling: Extreme Modulation (Double Speed Effect)</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #controls, #geoDisplay { margin-top: 20px; }
    .sliderContainer { margin-bottom: 10px; }
    label { margin-right: 10px; }
  </style>
</head>
<body>
  <h1>Mustang Idling: Extreme Modulation (Double Speed Effect)</h1>
  <button id="startButton">Start Engine Sound</button>
  
  <!-- Checkbox to toggle manual mode -->
  <div id="modeToggle" style="display:none; margin-top:20px;">
    <label>
      <input type="checkbox" id="manualToggle">
      Use Manual Control
    </label>
  </div>
  
  <!-- Manual controls -->
  <div id="manualControls" style="display:none;">
    <div class="sliderContainer">
      <label for="speedSlider">Speed (m/s):</label>
      <input type="range" id="speedSlider" min="0" max="50" step="0.1" value="0">
      <span id="speedValue">0.0</span>
    </div>
    <div class="sliderContainer">
      <label for="accSlider">Acceleration (m/s²):</label>
      <input type="range" id="accSlider" min="0" max="10" step="0.1" value="0">
      <span id="accValue">0.0</span>
    </div>
  </div>
  
  <!-- Geolocation display -->
  <div id="geoDisplay" style="display:none;">
    <strong>Geolocation Data:</strong>
    <div>Speed: <span id="geoSpeed">0.0</span> m/s</div>
    <div>Acceleration: <span id="geoAcc">0.0</span> m/s²</div>
  </div>
  
  <script>
    let audioCtx, source, gainNode;
    let buffer; // Decoded sound sample

    // For geolocation mode
    let geoWatchId = null;
    let prevGeoSpeed = null;
    let prevGeoTime = null; // in seconds

    // Flag for manual mode; default is false (use geolocation)
    let manualMode = false;
    
    // Load the sound file ("Sound.mp3" with a capital S)
    async function loadSound(url) {
      const response = await fetch(url);
      const arrayBuffer = await response.arrayBuffer();
      return await audioCtx.decodeAudioData(arrayBuffer);
    }

    // Start playing the sound sample (looped) with basic gain control
    async function startSound() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      buffer = await loadSound('Sound.mp3');
      source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.3; // Base volume
      
      source.connect(gainNode).connect(audioCtx.destination);
      source.start();
    }

    // Update sound parameters based on provided speed and acceleration.
    // Note: The speed effect is doubled so that 50 m/s now sounds like 100 m/s did before.
    function updateSound(speed, acceleration) {
      // Normalize values: speed is scaled such that (speed/50)*2 gives 2 at 50 m/s.
      const normSpeed = Math.min((speed / 50) * 2, 2);
      const normAcc = Math.min(acceleration / 10, 1);
      
      // Compute new playbackRate and gain with extreme mapping:
      const newRate = 1 + normSpeed * 0.5 + Math.pow(normAcc, 2) * 1.0;
      const newGain = 0.3 + normSpeed * 0.2 + Math.pow(normAcc, 2) * 0.3;
      
      // Smoothly update parameters
      source.playbackRate.setTargetAtTime(newRate, audioCtx.currentTime, 0.1);
      gainNode.gain.setTargetAtTime(newGain, audioCtx.currentTime, 0.1);
    }

    // Manual control update: get values from sliders and update sound
    function updateManual() {
      const manualSpeed = parseFloat(document.getElementById('speedSlider').value);
      const manualAcc = parseFloat(document.getElementById('accSlider').value);
      document.getElementById('speedValue').textContent = manualSpeed.toFixed(1);
      document.getElementById('accValue').textContent = manualAcc.toFixed(1);
      updateSound(manualSpeed, manualAcc);
    }

    // Geolocation update: compute acceleration from successive speed readings
    function startGeolocation() {
      if (navigator.geolocation) {
        geoWatchId = navigator.geolocation.watchPosition(successGeo, errorGeo, {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 5000
        });
      } else {
        console.error("Geolocation is not supported by your browser.");
      }
    }

    function successGeo(position) {
      let geoSpeed = position.coords.speed;
      if (geoSpeed === null || isNaN(geoSpeed)) {
        geoSpeed = 0;
      }
      const currentTime = position.timestamp / 1000; // Convert ms to seconds
      
      let geoAcc = 0;
      if (prevGeoSpeed !== null && prevGeoTime !== null) {
        const dt = currentTime - prevGeoTime;
        if (dt > 0) {
          geoAcc = Math.abs((geoSpeed - prevGeoSpeed) / dt);
        }
      }
      
      // Update display
      document.getElementById('geoSpeed').textContent = geoSpeed.toFixed(1);
      document.getElementById('geoAcc').textContent = geoAcc.toFixed(1);
      
      // Update sound parameters
      updateSound(geoSpeed, geoAcc);
      
      // Store for next calculation
      prevGeoSpeed = geoSpeed;
      prevGeoTime = currentTime;
    }

    function errorGeo(err) {
      console.error("Geolocation error: " + err.message);
    }

    // Toggle between manual and geolocation modes
    document.getElementById('manualToggle').addEventListener('change', (e) => {
      manualMode = e.target.checked;
      // Show/hide manual controls and geolocation display accordingly
      document.getElementById('manualControls').style.display = manualMode ? 'block' : 'none';
      document.getElementById('geoDisplay').style.display = manualMode ? 'none' : 'block';
      
      if (manualMode) {
        // Stop geolocation updates if any
        if (geoWatchId !== null) {
          navigator.geolocation.clearWatch(geoWatchId);
          geoWatchId = null;
        }
      } else {
        // Reset previous geolocation values and start geolocation
        prevGeoSpeed = null;
        prevGeoTime = null;
        startGeolocation();
      }
    });

    // Listen for manual slider changes
    document.getElementById('speedSlider').addEventListener('input', updateManual);
    document.getElementById('accSlider').addEventListener('input', updateManual);

    // Start sound on button click and begin in geolocation mode by default
    document.getElementById('startButton').addEventListener('click', async () => {
      await startSound();
      // Hide the start button; show mode toggle and geolocation display
      document.getElementById('startButton').style.display = 'none';
      document.getElementById('modeToggle').style.display = 'block';
      document.getElementById('manualToggle').checked = false;
      manualMode = false;
      document.getElementById('manualControls').style.display = 'none';
      document.getElementById('geoDisplay').style.display = 'block';
      startGeolocation();
    });
  </script>
</body>
</html>
