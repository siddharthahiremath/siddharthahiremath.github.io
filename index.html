<!DOCTYPE html>
<html>
<head>
  <title>Mustang Idling Sound Modulation</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #controls { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Mustang Idling Sound Modulation</h1>
  <button id="startButton">Start Engine Sound</button>
  <div id="controls" style="display:none;">
    <label for="speedSlider">Speed (m/s): </label>
    <input type="range" id="speedSlider" min="0" max="50" step="0.1" value="0">
    <span id="speedValue">0.0</span>
  </div>
  
  <script>
    let audioCtx, source, gainNode;
    let buffer; // holds the decoded sound sample

    // Load the sound file (mustang idling saved as Sound.mp3)
    async function loadSound(url) {
      const response = await fetch(url);
      const arrayBuffer = await response.arrayBuffer();
      return await audioCtx.decodeAudioData(arrayBuffer);
    }

    // Start playing the sound sample
    async function startSound() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      buffer = await loadSound('Sound.mp3'); // Ensure Sound.mp3 is in your project's root folder
      source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;  // Loop the idling sound continuously
      
      // Create a GainNode for volume control
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.3; // Base volume
      
      // Connect nodes: Source → GainNode → Destination
      source.connect(gainNode).connect(audioCtx.destination);
      source.start();
    }

    // Update sound parameters based on speed (in m/s)
    function updateSound(speed) {
      // Normalize speed to a 0–1 range (assuming 50 m/s is maximum)
      const norm = Math.min(speed / 50, 1);
      // Increase playbackRate from 1.0 (idle) up to 1.5 as speed increases
      const newRate = 1 + norm * 0.5;
      // Increase gain from 0.3 up to 0.5 as speed increases
      const newGain = 0.3 + norm * 0.2;
      
      // Smoothly update parameters
      source.playbackRate.setTargetAtTime(newRate, audioCtx.currentTime, 0.1);
      gainNode.gain.setTargetAtTime(newGain, audioCtx.currentTime, 0.1);
    }

    // Start the sound when the button is clicked
    document.getElementById('startButton').addEventListener('click', async () => {
      await startSound();
      document.getElementById('startButton').style.display = 'none';
      document.getElementById('controls').style.display = 'block';
    });

    // Update the speed display and modulate sound when slider changes
    document.getElementById('speedSlider').addEventListener('input', (e) => {
      const speed = parseFloat(e.target.value);
      document.getElementById('speedValue').textContent = speed.toFixed(1);
      updateSound(speed);
    });
  </script>
</body>
</html>
